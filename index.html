<!DOCTYPE html>
<html>
<head>
    <title>I LOVE YOU KARKI</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .card {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: pop 1s ease;
        }

        h1 {
            color: #ff4081;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff4081;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e91e63;
        }

        @keyframes pop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 I LOVE U TEJA </h1>
    <p>YAKE NAN MELE KOPA MADKOTHIYA</p>
    <button onclick="showMessage()">Click Me ❤️</button>
</div>

<script>
    function showMessage() {
        alert("Yavagllu Nan jothe ne Eru Baby✨");
    }
</script>

</body>
</html>
